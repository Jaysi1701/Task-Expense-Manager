<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Expense Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <h1>Task Expense Manager</h1>
    </header>

    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Tasks</a></li>
            <li><a href="#">Expenses</a></li>
            <li><a href="#">Reports</a></li>
        </ul>
    </nav>

    <main>

        <section class="hero">
            <h2>Manage Tasks and Expenses Easily</h2>
            <p>Track productivity and spending in one place.</p>
        </section>

        <section class="login-section">

            <h2>Login</h2>

            <form id="loginForm">

                <input
                    type="email"
                    id="email"
                    placeholder="Enter Email"
                    required>

                <input
                    type="password"
                    id="password"
                    placeholder="Enter Password"
                    required>

                <button type="submit">
                    Login
                </button>

            </form>

            <p id="message"></p>

        </section>

        <section class="task-manager">

            <h2>Task Manager</h2>

            <input
                type="text"
                id="taskInput"
                placeholder="Enter Task">

            <button id="addTaskBtn">
                Add Task
            </button>

            <ul id="taskList"></ul>

        </section>

        <section class="expense-manager">

            <h2>Expense Manager</h2>

            <input
                type="text"
                id="expenseName"
                placeholder="Expense Name">

            <input
                type="number"
                id="expenseAmount"
                placeholder="Amount">

            <button id="addExpenseBtn">
                Add Expense
            </button>

            <h3>
                Total Expenses:
                ₹<span id="totalExpense">0</span>
            </h3>

            <ul id="expenseList"></ul>

        </section>

    </main>

    <footer>
        <p>© 2026 Task Expense Manager</p>
    </footer>

    <script src="js/app.js"></script>

</body>

</html>
